<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Comment - {{ device.name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container">
        <h1>Edit Comment for {{ device.name }}</h1>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="post" class="form">
            <div class="form-group">
                <label for="comment">Comment:</label>
                <textarea id="comment" name="comment" rows="4" placeholder="Enter comment...">{{ device.comments or '' }}</textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn">Save Comment</button>
                <a href="{{ url_for('other_devices_menu') }}" class="btn">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
