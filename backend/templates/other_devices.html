<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Other Devices</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="container">
      <div class="header-top">
        <div class="header-left">
          <h1>Other Devices</h1>
          <img src="/static/images/logoc.png" alt="Logo" class="logo">
        </div>
        <div class="auth-status">
          {% if session.user_id %}
            <span>Logged in as <strong>{{ session.username }}</strong></span>
            <a class="btn" href="/logout" style="margin-left: 16px;">Logout</a>
          {% else %}
            <a class="btn" href="/login">Admin Login</a>
          {% endif %}
        </div>
      </div>
      <div class="actions">
        <a class="btn" href="/other-devices/add">Add device</a>
        <a class="btn" href="/other-devices/available">Available devices</a>
        <a class="btn" href="/other-devices/available" style="margin-left:8px">Borrow</a>
        <a class="btn" href="/other-devices/status" style="margin-left:8px">Show borrow status</a>
        <a class="btn" href="/" style="margin-left:8px;background:#ffeb3b;color:#000">Main</a>
      </div>
    </main>
  </body>
</html>
